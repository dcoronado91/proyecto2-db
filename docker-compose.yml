version: '3.9'

services:

  db:
    image: postgres:15-alpine
    container_name: tienda_db
    environment:
      POSTGRES_DB: tienda
      POSTGRES_USER: proy2
      POSTGRES_PASSWORD: secret
    volumes:
      - ./db/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./db/02_seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proy2 -d tienda"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: node:18-alpine
    container_name: tienda_backend
    working_dir: /app
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgres://proy2:secret@db:5432/tienda
      JWT_SECRET: clave_super_secreta_cambiar_en_produccion
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npm install && npm run dev"

  frontend:
    image: node:18-alpine
    container_name: tienda_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev"

volumes:
  pgdata:
